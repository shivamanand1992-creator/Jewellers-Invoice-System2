[build]
installCommand = "pnpm install --no-frozen-lockfile"
buildCommand = "pnpm --filter @workspace/jewellers run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "NODE_ENV=production node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
restartPolicyType = "ON_FAILURE"
